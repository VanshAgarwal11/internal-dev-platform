apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.10.1
    helm:
      values: |
        alertmanager:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 2d
            resources:
              requests:
                cpu: 200m
                memory: 400Mi
              limits:
                memory: 800Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 2Gi
        grafana:
          adminPassword: admin
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true