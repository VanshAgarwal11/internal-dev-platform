apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: greeter-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/VanshAgarwal11/internal-dev-platform.git
    targetRevision: main
    path: apps/greeter/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
