apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: devplatform
servers: 1
agents: 2
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --flannel-backend=none
        nodeFilters:
          - server:*
      - arg: --disable-network-policy
        nodeFilters:
          - server:*
      - arg: --cluster-cidr=192.168.0.0/16
        nodeFilters:
          - server:*
