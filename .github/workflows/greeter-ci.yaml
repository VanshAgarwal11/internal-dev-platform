name: greeter-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/greeter/**'
      - '.github/workflows/greeter-ci.yaml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase the image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/greeter
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/greeter:latest
            ghcr.io/${{ env.OWNER_LC }}/greeter:${{ github.sha }}
