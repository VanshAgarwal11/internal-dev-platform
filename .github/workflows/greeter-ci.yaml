name: greeter-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/greeter/src/**'
      - 'apps/greeter/Dockerfile'
      - '.github/workflows/greeter-ci.yaml'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase the image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/greeter
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/greeter:latest
            ghcr.io/${{ env.OWNER_LC }}/greeter:${{ github.sha }}

      - name: Update deployment manifest with new image tag
        run: |
          NEW_IMAGE="ghcr.io/${{ env.OWNER_LC }}/greeter:${{ github.sha }}"
          sed -i "s|image: ghcr.io/${{ env.OWNER_LC }}/greeter:.*|image: ${NEW_IMAGE}|" \
            apps/greeter/k8s/base/deployment.yaml
          echo "Updated manifest to: ${NEW_IMAGE}"

      - name: Commit the updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/greeter/k8s/base/deployment.yaml
          if git diff --staged --quiet; then
            echo "No manifest change to commit."
          else
            git commit -m "ci: bump greeter image to ${{ github.sha }} [skip ci]"
            git push
          fi
